<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PSR ICE MINING · ARTEMIS PROTOCOL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #020710; }

      :root {
        --p1: #ffd700;
        --p2: #b000ff;
        --accent: #00d4ff;
        --danger: #ff4444;
        --success: #44ff88;
        --text-dim: #3a5068;
        --text-mid: #6a8fa8;
        --text-bright: #9bbcd4;
        --panel-bg: rgba(6,12,24,0.96);
        --panel-border: rgba(255,255,255,0.07);
        --mono: 'JetBrains Mono', 'Courier New', monospace;
        --display: 'Orbitron', 'Courier New', monospace;
      }

      /* Global scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #010508; }
      ::-webkit-scrollbar-thumb { background: #1a3050; border-radius: 2px; }

      /* Button/input hover effects */
      button { transition: all 0.12s ease; }
      button:hover:not(:disabled) { filter: brightness(1.15); }
      button:active:not(:disabled) { transform: scale(0.97); }

      input[type="range"] {
        height: 4px;
        border-radius: 2px;
        appearance: none;
        -webkit-appearance: none;
        background: rgba(255,255,255,0.08);
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: currentColor;
        cursor: pointer;
        box-shadow: 0 0 6px currentColor;
      }

      select {
        transition: border-color 0.12s;
      }
      select:hover {
        border-color: rgba(255,255,255,0.2) !important;
      }

      /* Pulse animation for active turn */
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 8px rgba(255,215,0,0.2); }
        50% { box-shadow: 0 0 20px rgba(255,215,0,0.5); }
      }
      @keyframes pulse-glow-p2 {
        0%, 100% { box-shadow: 0 0 8px rgba(176,0,255,0.2); }
        50% { box-shadow: 0 0 20px rgba(176,0,255,0.5); }
      }
      @keyframes scanline {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100vh); }
      }
      @keyframes flicker {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.97; }
        51% { opacity: 0.94; }
        52% { opacity: 1; }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .fade-in { animation: fadeIn 0.3s ease; }

      /* Tooltip */
      [title]:hover::after {
        content: attr(title);
        position: absolute;
        bottom: calc(100% + 5px);
        left: 50%;
        transform: translateX(-50%);
        background: rgba(4,10,22,0.97);
        border: 1px solid rgba(255,255,255,0.12);
        color: #8faac0;
        padding: 3px 7px;
        border-radius: 3px;
        font-size: 8px;
        white-space: nowrap;
        pointer-events: none;
        font-family: 'JetBrains Mono', monospace;
        z-index: 100;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
